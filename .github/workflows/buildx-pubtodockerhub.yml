# ==============================================================================
# Workflow Réutilisable : Build, Test & Publication sur DockerHub
# ==============================================================================
# Description : Ce workflow compile l'application, exécute les tests et
#               publie l'image Docker sur DockerHub pour le namespace spécifié.
#
# Entrées (Inputs) :
#   - dockerhub_image_prefix : Le préfixe de l'image Docker.
#   - docker_tag_target : Cible (target) de l'image Docker à builder.
#
# Secrets requis :
#   - DOCKERHUB_USERNAME : Nom d'utilisateur DockerHub pour la connexion.
#   - DOCKERHUB_TOKEN : Token d'accès DockerHub (ou mot de passe).
# ==============================================================================
name: "Buildx Publish"

on:
  workflow_call:
    inputs:
      dockerhub_image_prefix:
        description: "Préfixe de l'image DockerHub"
        required: true
        type: string
      docker_tag_target:
        description: "Cible (target) de l'image Docker à builder"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        description: "Nom d'utilisateur DockerHub pour la connexion"
        required: true
      DOCKERHUB_TOKEN:
        description: "Token ou mot de passe DockerHub"
        required: true

jobs:
  buildx-test-pubtodockerhub:
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source
      - name: "Build: checkout source code"
        uses: actions/checkout@v6

      # Préparation des tags Docker (ex: latest, branch-name, version git)
      - name: "Push: prepare version from git tags/branchs"
        id: docker_tag_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.dockerhub_image_prefix }}

      # Configuration du builder Docker Buildx
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      # Connexion à DockerHub si les conditions de publication sont remplies
      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et Push de l'image Web
      - name: "Buildx and push"
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')) }}
          target: ${{ inputs.docker_tag_target }}
          tags: ${{ steps.docker_tag_meta.outputs.tags }}-${{ inputs.docker_tag_target }}
